<!DOCTYPE html>
<html>
<body>
<script>
fetch('/index.html')
  .then(r => r.text())
  .then(text => {
    if (window.opener) {
      window.opener.postMessage({type: 'file_content', data: text}, '*');
      document.body.innerText = 'Content sent! (' + text.length + ' chars). You can close this tab.';
    } else {
      document.body.innerText = 'No opener window found.';
    }
  })
  .catch(e => {
    document.body.innerText = 'Error: ' + e.message;
  });
</script>
</body>
</html>
