<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <title>The Daily Scoop</title>
<style>
body{font-family:Georgia,serif;background:#f9f9f9;margin:0}
.bar{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:0 24px;display:flex;align-items:center;gap:4px;position:sticky;top:0}
.bar-title{color:#fff;font-size:16px;font-weight:bold;margin-right:16px;padding:14px 0}
  .tab{padding:14px 18px;color:#aaa;cursor:pointer;border-bottom:3px solid transparent;font-size:13px}
.tab.active{color:#fff;border-bottom-color:#e8d5a3;font-weight:bold}
.content{max-width:800px;margin:40px auto;padding:0 24px 60px;text-align:center}
.box{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:80px 40px}
.box .icon{font-size:64px;margin-bottom:24px}
.box h1{font-size:28px;color:#1a1a2e;margin-bottom:12px}
.box p{color:#777;font-size:16px;line-height:1.6}
.footer{color:#bbb;font-size:12px;margin-top:40px}
</style>
  </head>
  <body>
  <div class="bar">
    <span class="bar-title">The Daily Scoop</span>
  <div class="tab active">Today</div>
</div>
<div class="content">
  <div class="box">
    <div class="icon">☕</div>
    <h1>Your first issue is on its way</h1>
    <p>The Daily Scoop will appear here after the first morning run.<br>Check back tomorrow — your world in 5 minutes, delivered daily.</p>
    </div>
    <div class="footer">The Daily Scoop • 0 issues so far</div>
</div>
</body>
</html>
